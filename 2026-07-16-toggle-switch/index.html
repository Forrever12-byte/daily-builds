<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Name</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    darkMode: 'class'
  }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
    <div class="flex items-center justify-center h-screen bg-gray-100 dark:bg-gray-800">
        <label class="relative">
            <input type="checkbox" id="theme-toggle" class="sr-only peer"><div class="w-14 h-8 rounded-full bg-gray-300 peer peer-checked:bg-gray-600"></div>
            <div class="absolute w-6 h-6 left-1 top-1 rounded-full bg-white transition-transform peer-checked:translate-x-6"></div>
        </label>
    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');

        toggle.addEventListener('change', () => {
            document.documentElement.classList.toggle('dark');
        });
    </script>
</body>
</html>
