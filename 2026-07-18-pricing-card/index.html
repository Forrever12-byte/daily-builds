<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Card with Hover Lift</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    darkMode: 'class'
  }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
    
    <div class="h-screen flex items-center justify-center">

        <div class="rounded-2xl p-3 bg-slate-900 w-10/12 md:w-5/12 h-1/2 text-slate-200 shadow-2xl hover:-translate-y-2 hover:shadow-gray-800 transition duration-150 ease-out flex flex-col items-center justify-center gap-9">

            <h2 class="text-2xl">Basic Plan</h2>
            <p class="text-6xl text-orange-400 font-bold">$19/mo</p>
            <ul class="flex flex-col gap-5">
                <li><span class="text-green-400">✓</span> Up to 5 team members</li>
                <li><span class="text-green-400">✓</span> 10GB cloud storage</li>
                <li><span class="text-green-400">✓</span> 24/7 chat support</li>
            </ul>

            <button class="rounded-full w-6/12 h-12 bg-sky-400 hover:bg-sky-600">Get</button>

        </div>

    </div>
    
</body>
</html>
