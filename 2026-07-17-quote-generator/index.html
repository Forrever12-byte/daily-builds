<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Name</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    darkMode: 'class'
  }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
    <div class="flex items-center justify-center h-screen bg-gray-700">
        <div class="card p-8 flex flex-col flex-shrink items-center justify-center gap-10 bg-gray-100 w-5/12 h-96 rounded-3xl shadow-lg shadow-gray-950">

            <blockquote id="quote-text" class="quote font-black bg-gray-200 p-5 h-36 overflow-y-auto">Click the button to get a quote</blockquote>

            <button id="new-quote-btn" class="randomize-btn bg-gray-700 hover:bg-gray-400 w-36 h-12 p-3 rounded-md text-white">New Quote</button>

        </div>
    </div>

    <script>
        async function getQuote() {
        const response = await fetch('https://dummyjson.com/quotes/random');
        const data = await response.json();
        
        const quote = document.getElementById('quote-text');
        quote.textContent = `${data.quote} — ${data.author}`;
        }

        const next = document.getElementById('new-quote-btn');
        next.addEventListener('click', () => {
            getQuote();
        });

        getQuote();
    </script>
</body>
</html>
